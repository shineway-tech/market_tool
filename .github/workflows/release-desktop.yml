name: Release Desktop

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-desktop-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare-release:
    name: Prepare GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reset draft release for tag
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          release_json="$(gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --json databaseId,isDraft 2>/dev/null || true)"
          if [ -n "$release_json" ]; then
            is_draft="$(printf '%s' "$release_json" | jq -r '.isDraft')"
            if [ "$is_draft" = "true" ]; then
              gh release delete "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --yes
            else
              echo "Release $GITHUB_REF_NAME already exists and is not a draft. Refusing to delete it."
              exit 1
            fi
          fi

          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --draft \
            --title "Channel Nest $GITHUB_REF_NAME" \
            --notes "Desktop release for Channel Nest. Installers and updater packages are uploaded to OSS; GitHub only exposes the source code archives."

  build-macos:
    name: Build ${{ matrix.name }}
    needs: prepare-release
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Intel
            rust-target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
            artifact_arch: x64
            update_arch: x86_64
          - name: macOS Apple Silicon
            rust-target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
            artifact_arch: aarch64
            update_arch: aarch64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Build frontend
        run: npm run build

      - name: Import Apple Developer ID certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -z "${APPLE_CERTIFICATE:-}" ] || [ -z "${APPLE_CERTIFICATE_PASSWORD:-}" ] || [ -z "${KEYCHAIN_PASSWORD:-}" ]; then
            echo "Missing macOS signing secrets. Set APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD and KEYCHAIN_PASSWORD."
            exit 1
          fi

          export CERT_PATH="$RUNNER_TEMP/developer-id-application.p12"
          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          Path(os.environ["CERT_PATH"]).write_bytes(base64.b64decode(os.environ["APPLE_CERTIFICATE"]))
          PY

          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import "$CERT_PATH" -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain

          CERT_ID="$(security find-identity -v -p codesigning build.keychain | awk -F '"' '/Developer ID Application/ { print $2; exit }')"
          if [ -z "$CERT_ID" ]; then
            echo "Developer ID Application certificate was not found in the temporary keychain."
            security find-identity -v -p codesigning build.keychain
            exit 1
          fi

          echo "APPLE_SIGNING_IDENTITY=$CERT_ID" >> "$GITHUB_ENV"

      - name: Write Apple notarization API key
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          set -euo pipefail

          if [ -z "${APPLE_API_ISSUER:-}" ] || [ -z "${APPLE_API_KEY:-}" ] || [ -z "${APPLE_API_KEY_BASE64:-}" ]; then
            echo "Missing Apple notarization secrets. Set APPLE_API_ISSUER, APPLE_API_KEY and APPLE_API_KEY_BASE64."
            exit 1
          fi

          export API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY}.p8"
          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          Path(os.environ["API_KEY_PATH"]).write_bytes(base64.b64decode(os.environ["APPLE_API_KEY_BASE64"]))
          PY

          chmod 600 "$API_KEY_PATH"
          echo "APPLE_API_KEY_PATH=$API_KEY_PATH" >> "$GITHUB_ENV"

      - name: Build macOS Tauri app with retry
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        run: |
          set -euo pipefail

          for attempt in 1 2 3; do
            echo "macOS build attempt ${attempt}/3"
            if ! curl --connect-timeout 15 --max-time 30 -fsSI https://appstoreconnect.apple.com/ >/dev/null; then
              echo "Apple services network preflight failed; continuing so the build can retry notarization normally."
            fi

            if npm run tauri -- build --verbose ${{ matrix.args }}; then
              exit 0
            fi

            if [ "$attempt" = "3" ]; then
              echo "macOS build failed after ${attempt} attempts."
              exit 1
            fi

            rm -rf "src-tauri/target/${{ matrix.rust-target }}/release/bundle"
            sleep $((attempt * 90))
          done

      - name: Prepare macOS release artifacts
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -euo pipefail

          app_version="$(node -p "require('./frontend/package.json').version")"
          arch="${{ matrix.artifact_arch }}"
          bundle_dir="src-tauri/target/${{ matrix.rust-target }}/release/bundle"
          output_dir="release-macos"
          mkdir -p "$output_dir"

          dmg_file="$(find "$bundle_dir/dmg" -maxdepth 1 -name '*.dmg' -print -quit)"
          app_tar_file="$(find "$bundle_dir/macos" -maxdepth 1 -name '*.app.tar.gz' -print -quit)"
          app_sig_file="$(find "$bundle_dir/macos" -maxdepth 1 -name '*.app.tar.gz.sig' -print -quit)"

          if [ -z "$dmg_file" ] || [ -z "$app_tar_file" ] || [ -z "$app_sig_file" ]; then
            echo "Missing expected macOS release artifacts."
            find "$bundle_dir" -maxdepth 4 -type f -print
            exit 1
          fi

          cp "$dmg_file" "$output_dir/Channel_Nest_${app_version}_macos_${arch}.dmg"
          cp "$app_tar_file" "$output_dir/Channel_Nest_${app_version}_macos_${arch}.app.tar.gz"
          cp "$app_sig_file" "$output_dir/Channel_Nest_${app_version}_macos_${arch}.app.tar.gz.sig"

      - name: Upload macOS artifacts to OSS
        if: startsWith(github.ref, 'refs/tags/')
        env:
          ALIYUN_OSS_REGION: ${{ secrets.ALIYUN_OSS_REGION }}
          ALIYUN_OSS_BUCKET: ${{ secrets.ALIYUN_OSS_BUCKET }}
          ALIYUN_OSS_ACCESS_KEY_ID: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_ID }}
          ALIYUN_OSS_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_SECRET }}
          ALIYUN_OSS_ENDPOINT: ${{ secrets.ALIYUN_OSS_ENDPOINT }}
          ALIYUN_OSS_PUBLIC_BASE_URL: ${{ secrets.ALIYUN_OSS_PUBLIC_BASE_URL || 'https://cdn.honeykid.cn' }}
          ALIYUN_OSS_PREFIX: ${{ secrets.ALIYUN_OSS_PREFIX || 'public/market_tool' }}
          ALIYUN_OSS_OBJECT_ACL: ${{ secrets.ALIYUN_OSS_OBJECT_ACL }}
        run: |
          set -euo pipefail

          app_version="$(node -p "require('./frontend/package.json').version")"
          arch="${{ matrix.artifact_arch }}"
          update_arch="${{ matrix.update_arch }}"
          mkdir -p release-update-manifests

          node backend/channel_nest_api/scripts/upload-desktop-artifacts.js \
            --dir release-macos \
            --version "$app_version" \
            --platform "darwin-${update_arch}" \
            --update-file "Channel_Nest_${app_version}_macos_${arch}.app.tar.gz" \
            --signature-file "Channel_Nest_${app_version}_macos_${arch}.app.tar.gz.sig" \
            --manifest-file "release-update-manifests/darwin-${update_arch}.json"

      - name: Upload macOS update manifest
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: release-update-manifest-darwin-${{ matrix.update_arch }}
          path: release-update-manifests/*.json

  build-windows:
    name: Build Windows x64
    needs: prepare-release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Build frontend
        run: npm run build

      - name: Build Windows app and updater package
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri -- build --bundles nsis --verbose

      - name: Prepare Windows release artifacts
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path release-windows | Out-Null
          $appVersion = (Get-Content "frontend/package.json" | ConvertFrom-Json).version
          Copy-Item "src-tauri/target/release/channel-nest.exe" "release-windows/Channel_Nest_${appVersion}_windows_x64_portable.exe" -Force

          $bundleDir = "src-tauri/target/release/bundle/nsis"
          if (!(Test-Path $bundleDir)) {
            Write-Error "Missing Windows NSIS bundle directory."
            Get-ChildItem "src-tauri/target/release/bundle" -Recurse -File | ForEach-Object { Write-Host $_.FullName }
            exit 1
          }

          $copiedSignature = $false
          Get-ChildItem $bundleDir -File | ForEach-Object {
            $targetName = $null
            if ($_.Name.EndsWith(".exe.sig")) {
              $targetName = "Channel_Nest_${appVersion}_windows_x64_setup.exe.sig"
              $copiedSignature = $true
            } elseif ($_.Name.EndsWith(".exe")) {
              $targetName = "Channel_Nest_${appVersion}_windows_x64_setup.exe"
            } elseif ($_.Name.EndsWith(".zip.sig")) {
              $targetName = "Channel_Nest_${appVersion}_windows_x64_updater.zip.sig"
              $copiedSignature = $true
            } elseif ($_.Name.EndsWith(".zip")) {
              $targetName = "Channel_Nest_${appVersion}_windows_x64_updater.zip"
            }

            if ($targetName) {
              Copy-Item $_.FullName "release-windows/$targetName" -Force
            }
          }

          if (!$copiedSignature) {
            Write-Error "Missing Windows updater signature file."
            Get-ChildItem $bundleDir -File | ForEach-Object { Write-Host $_.FullName }
            exit 1
          }

      - name: Upload Windows artifacts to OSS
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          ALIYUN_OSS_REGION: ${{ secrets.ALIYUN_OSS_REGION }}
          ALIYUN_OSS_BUCKET: ${{ secrets.ALIYUN_OSS_BUCKET }}
          ALIYUN_OSS_ACCESS_KEY_ID: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_ID }}
          ALIYUN_OSS_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_SECRET }}
          ALIYUN_OSS_ENDPOINT: ${{ secrets.ALIYUN_OSS_ENDPOINT }}
          ALIYUN_OSS_PUBLIC_BASE_URL: ${{ secrets.ALIYUN_OSS_PUBLIC_BASE_URL || 'https://cdn.honeykid.cn' }}
          ALIYUN_OSS_PREFIX: ${{ secrets.ALIYUN_OSS_PREFIX || 'public/market_tool' }}
          ALIYUN_OSS_OBJECT_ACL: ${{ secrets.ALIYUN_OSS_OBJECT_ACL }}
        run: |
          $appVersion = (Get-Content "frontend/package.json" | ConvertFrom-Json).version
          New-Item -ItemType Directory -Force -Path release-update-manifests | Out-Null

          node backend/channel_nest_api/scripts/upload-desktop-artifacts.js `
            --dir release-windows `
            --version $appVersion `
            --platform windows-x86_64 `
            --update-file "Channel_Nest_${appVersion}_windows_x64_setup.exe" `
            --signature-file "Channel_Nest_${appVersion}_windows_x64_setup.exe.sig" `
            --manifest-file "release-update-manifests/windows-x86_64.json"

      - name: Upload Windows update manifest
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: release-update-manifest-windows-x86_64
          path: release-update-manifests/*.json

  publish-release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build-macos
      - build-windows
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download update manifests
        uses: actions/download-artifact@v4
        with:
          pattern: release-update-manifest-*
          path: release-update-manifests
          merge-multiple: true

      - name: Publish desktop update manifest
        env:
          DESKTOP_UPDATE_RELEASE_TOKEN: ${{ secrets.DESKTOP_UPDATE_RELEASE_TOKEN }}
          DESKTOP_UPDATE_API_URL: ${{ secrets.DESKTOP_UPDATE_API_URL }}
          DESKTOP_UPDATE_NOTES: Desktop release for Channel Nest.
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          node backend/channel_nest_api/scripts/publish-desktop-update.js \
            --manifest-dir release-update-manifests \
            --version "$version"

      - name: Publish draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release edit "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --draft=false
