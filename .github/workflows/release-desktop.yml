name: Release Desktop

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-desktop-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare-release:
    name: Prepare GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Reset draft release for tag
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          release_json="$(gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --json databaseId,isDraft 2>/dev/null || true)"
          if [ -n "$release_json" ]; then
            is_draft="$(printf '%s' "$release_json" | jq -r '.isDraft')"
            if [ "$is_draft" = "true" ]; then
              gh release delete "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --yes
            else
              echo "Release $GITHUB_REF_NAME already exists and is not a draft. Refusing to delete it."
              exit 1
            fi
          fi

          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --draft \
            --title "Marketing Master $GITHUB_REF_NAME" \
            --notes "Desktop release for Marketing Master."

  build-macos:
    name: Build ${{ matrix.name }}
    needs: prepare-release
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Intel
            rust-target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          - name: macOS Apple Silicon
            rust-target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Import Apple Developer ID certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -z "${APPLE_CERTIFICATE:-}" ] || [ -z "${APPLE_CERTIFICATE_PASSWORD:-}" ] || [ -z "${KEYCHAIN_PASSWORD:-}" ]; then
            echo "Missing macOS signing secrets. Set APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD and KEYCHAIN_PASSWORD."
            exit 1
          fi

          export CERT_PATH="$RUNNER_TEMP/developer-id-application.p12"
          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          Path(os.environ["CERT_PATH"]).write_bytes(base64.b64decode(os.environ["APPLE_CERTIFICATE"]))
          PY

          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import "$CERT_PATH" -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain

          CERT_ID="$(security find-identity -v -p codesigning build.keychain | awk -F '"' '/Developer ID Application/ { print $2; exit }')"
          if [ -z "$CERT_ID" ]; then
            echo "Developer ID Application certificate was not found in the temporary keychain."
            security find-identity -v -p codesigning build.keychain
            exit 1
          fi

          echo "APPLE_SIGNING_IDENTITY=$CERT_ID" >> "$GITHUB_ENV"

      - name: Write Apple notarization API key
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          set -euo pipefail

          if [ -z "${APPLE_API_ISSUER:-}" ] || [ -z "${APPLE_API_KEY:-}" ] || [ -z "${APPLE_API_KEY_BASE64:-}" ]; then
            echo "Missing Apple notarization secrets. Set APPLE_API_ISSUER, APPLE_API_KEY and APPLE_API_KEY_BASE64."
            exit 1
          fi

          export API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY}.p8"
          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          Path(os.environ["API_KEY_PATH"]).write_bytes(base64.b64decode(os.environ["APPLE_API_KEY_BASE64"]))
          PY

          chmod 600 "$API_KEY_PATH"
          echo "APPLE_API_KEY_PATH=$API_KEY_PATH" >> "$GITHUB_ENV"

      - name: Build and publish macOS Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          MARKETING_MASTER_RELAY_API_KEY: ${{ secrets.MARKETING_MASTER_RELAY_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        with:
          tagName: v__VERSION__
          releaseName: Marketing Master v__VERSION__
          releaseBody: |
            Desktop release for Marketing Master.

            Built targets:
            - macOS Intel
            - macOS Apple Silicon
            - Windows x64 portable exe
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
          assetNamePattern: "[name]_[version]_[platform]_[arch]_[bundle].[ext]"

  build-windows:
    name: Build Windows x64 portable exe
    needs: prepare-release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Windows portable app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          MARKETING_MASTER_RELAY_API_KEY: ${{ secrets.MARKETING_MASTER_RELAY_API_KEY }}
        run: npm run tauri -- build --no-bundle --verbose

      - name: Prepare Windows portable exe
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path release-portable | Out-Null
          Copy-Item "src-tauri/target/release/marketing-master.exe" "release-portable/marketing-master_${env:GITHUB_REF_NAME}_windows_x64_portable.exe" -Force

      - name: Upload Windows portable exe release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Marketing Master ${{ github.ref_name }}
          body: |
            Desktop release for Marketing Master.

            Built targets:
            - macOS Intel
            - macOS Apple Silicon
            - Windows x64 portable exe
          draft: true
          prerelease: false
          files: release-portable/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
